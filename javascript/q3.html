<!DOCTYPE html>
<html>
<head>
<title>Birthday Finder</title>
</head>
<body>

<input type="date" id="date">
<button onclick="findDay()">Find</button>

<script>
function findDay(){
let d=new Date(document.getElementById('date').value);
let days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
alert(days[d.getDay()]);
}
</script>

</body>
</html>
